<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#10161a" />
    <title>Chat Playground</title>
    <link rel="icon" type="image/png" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles/theme.css" />
  </head>
  <body>
    <div id="app" class="app">
      <!-- サイドバー -->
      <aside class="sidebar" id="sidebar" aria-label="会話一覧">
        <div class="sidebar-head">
          <span class="brand" id="appName">Chat Playground</span>
          <button id="newChat" class="btn primary" type="button">＋ 新しい会話</button>
        </div>
        <nav id="convList" class="conv-list" aria-label="履歴"></nav>
        <div class="sidebar-foot">
          <button id="openSettings" class="btn ghost" type="button">⚙ 設定</button>
        </div>
      </aside>

      <!-- メイン -->
      <main class="main">
        <header class="topbar">
          <button id="menuToggle" class="btn icon only-mobile" type="button" aria-label="メニュー">☰</button>
          <div class="rail" id="rail">未設定</div>
        </header>

        <section id="messages" class="messages" aria-live="polite"></section>

        <form id="composer" class="composer" autocomplete="off">
          <textarea id="input" class="input" rows="1" placeholder="メッセージを入力…（Shift+Enter で改行）"></textarea>
          <button id="send" class="btn primary send" type="submit">送信</button>
          <button id="stop" class="btn danger send hidden" type="button">停止</button>
        </form>
      </main>

      <!-- モバイル用オーバーレイ -->
      <div id="overlay" class="overlay hidden"></div>
    </div>

    <!-- 設定モーダル -->
    <dialog id="settingsDialog" class="dialog">
      <form method="dialog" class="dialog-form" id="settingsForm">
        <h2>接続設定</h2>
        <label>エンドポイント
          <input name="endpoint" type="url" placeholder="https://…/v1/chat/completions" />
        </label>
        <label>API キー
          <input name="apiKey" type="password" placeholder="agk_…" />
        </label>
        <label>認証方式
          <select name="authMode">
            <option value="bearer">Bearer（Authorization: Bearer &lt;key&gt;）</option>
            <option value="raw">Raw（Authorization: &lt;key&gt;）</option>
            <option value="custom">Custom ヘッダ</option>
          </select>
        </label>
        <label id="customHeaderRow" class="hidden">カスタムヘッダ名
          <input name="customHeader" type="text" placeholder="X-Api-Key" />
        </label>
        <label>モデル
          <input name="model" type="text" placeholder="google-ai-studio/gemini-2.5-flash" />
        </label>
        <p id="testResult" class="test-result" role="status"></p>
        <div class="dialog-actions">
          <button type="button" id="testBtn" class="btn ghost">接続をテスト</button>
          <span class="spacer"></span>
          <button type="submit" class="btn primary">保存</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast hidden" role="alert"></div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
